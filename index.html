<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #14161a;
    --grid: #1c1f25;
    --snake: #d9a441;       /* brass / machinery */
    --snake-head: #ffcf5c;  /* polished metal */
    --food: #ff5a36;        /* hazard orange */
    --text: #d7dadf;
    --accent: #ffb340;      /* warning amber */
    --steel: #2a2e36;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background:
      repeating-linear-gradient(45deg, #0d0d0f 0 18px, #0a0a0c 18px 36px),
      var(--bg);
    color: var(--text);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 20px;
  }
  .hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: 14px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #9ca3af;
  }
  .hud b { color: var(--text); font-size: 18px; }
  .stage {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 3px solid var(--steel);
    box-shadow:
      0 0 0 1px #000,
      inset 0 0 0 2px #0a0a0c,
      0 20px 60px rgba(0,0,0,0.7);
  }
  /* hazard stripe frame accents */
  .stage::before, .stage::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 4px;
    background: repeating-linear-gradient(45deg, var(--accent) 0 8px, #1a1a1a 8px 16px);
    z-index: 2;
    opacity: 0.55;
  }
  .stage::before { top: 0; }
  .stage::after { bottom: 0; }
  canvas { display: block; background: var(--panel); }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(15,17,23,0.82);
    backdrop-filter: blur(2px);
    text-align: center;
    padding: 20px;
    transition: opacity 0.2s;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay h1 { font-size: 28px; color: var(--accent); }
  .overlay p { color: #9ca3af; font-size: 14px; line-height: 1.6; }
  .overlay .big { font-size: 20px; color: var(--text); }
  .hint { font-size: 12px; color: #6b7280; }
  kbd {
    background: var(--grid);
    border: 1px solid #2b3140;
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div>Score <b id="score">0</b></div>
      <div>Best <b id="best">0</b></div>
    </div>
    <div class="stage">
      <canvas id="game" width="420" height="420"></canvas>
      <div class="overlay" id="overlay">
        <h1>⚙ SNAKE — FACTORY</h1>
        <p>Use <kbd>←</kbd><kbd>↑</kbd><kbd>↓</kbd><kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move.<br>Collect the cargo. Don't hit the walls or yourself.</p>
        <p class="big">Press <kbd>Space</kbd> to start</p>
      </div>
    </div>
    <div class="hint">Space / Enter: start &amp; pause &nbsp;·&nbsp; Arrows or WASD: steer</div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');

  const CELLS = 21;                       // grid is CELLS x CELLS
  const SIZE = canvas.width / CELLS;       // pixel size of one cell
  const START_SPEED = 130;                 // ms per step
  const MIN_SPEED = 60;
  const SPEED_STEP = 4;                    // ms faster per food

  let snake, dir, nextDir, food, score, speed, alive, running, timer;

  let best = Number(localStorage.getItem('snake-best') || 0);
  bestEl.textContent = best;

  function reset() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = START_SPEED;
    alive = true;
    scoreEl.textContent = score;
    placeFood();
  }

  function placeFood() {
    let p;
    do {
      p = { x: rand(CELLS), y: rand(CELLS) };
    } while (snake.some(s => s.x === p.x && s.y === p.y));
    food = p;
  }

  function rand(n) { return Math.floor(Math.random() * n); }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall or self collision
    if (head.x < 0 || head.y < 0 || head.x >= CELLS || head.y >= CELLS ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('snake-best', best);
      }
      speed = Math.max(MIN_SPEED, speed - SPEED_STEP);
      placeFood();
      schedule();
    } else {
      snake.pop();
    }

    draw();
  }

  function schedule() {
    clearTimeout(timer);
    timer = setTimeout(tick, speed);
  }

  function tick() {
    if (!running || !alive) return;
    step();
    if (alive) schedule();
  }

  function draw() {
    // background grid
    ctx.fillStyle = getCSS('--panel');
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = getCSS('--grid');
    for (let i = 0; i < CELLS; i++) {
      for (let j = 0; j < CELLS; j++) {
        if ((i + j) % 2 === 0) ctx.fillRect(i * SIZE, j * SIZE, SIZE, SIZE);
      }
    }

    // food (glowing hazard)
    ctx.save();
    ctx.shadowColor = getCSS('--food');
    ctx.shadowBlur = 18;
    drawCell(food.x, food.y, getCSS('--food'), 0.45);
    ctx.restore();

    // snake (segmented machinery)
    snake.forEach((s, i) => {
      const color = i === 0 ? getCSS('--snake-head') : getCSS('--snake');
      drawCell(s.x, s.y, color, 0.14);
      // bolt / rivet on each segment
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      const cx = s.x * SIZE + SIZE / 2;
      const cy = s.y * SIZE + SIZE / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, SIZE * 0.1, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawCell(x, y, color, radiusFactor) {
    const pad = SIZE * 0.08;
    const r = SIZE * radiusFactor;
    ctx.fillStyle = color;
    roundRect(x * SIZE + pad, y * SIZE + pad, SIZE - pad * 2, SIZE - pad * 2, r);
    ctx.fill();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function getCSS(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function start() {
    reset();
    running = true;
    overlay.classList.add('hidden');
    draw();
    schedule();
  }

  function togglePause() {
    if (!alive) { start(); return; }
    running = !running;
    if (running) {
      overlay.classList.add('hidden');
      schedule();
    } else {
      showOverlay('PAUSED', 'Press <kbd>Space</kbd> to resume');
    }
  }

  function gameOver() {
    alive = false;
    running = false;
    clearTimeout(timer);
    showOverlay('GAME OVER',
      `<span class="big">Score: ${score}</span><br>Press <kbd>Space</kbd> to play again`);
  }

  function showOverlay(title, html) {
    overlay.innerHTML = `<h1>${title}</h1><p>${html}</p>`;
    overlay.classList.remove('hidden');
  }

  const DIRS = {
    ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 },
    ArrowDown:  { x: 0, y: 1 },  s: { x: 0, y: 1 },
    ArrowLeft:  { x: -1, y: 0 }, a: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },  d: { x: 1, y: 0 },
  };

  document.addEventListener('keydown', (e) => {
    const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;

    if (key === ' ' || key === 'Enter') {
      e.preventDefault();
      if (!running && alive && snake) togglePause();
      else if (!running) start();
      else togglePause();
      return;
    }

    const nd = DIRS[key];
    if (nd && running && alive) {
      // prevent 180° reversal
      if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
      e.preventDefault();
    }
  });

  // initial paint
  reset();
  running = false;
  draw();
})();
</script>
</body>
</html>
